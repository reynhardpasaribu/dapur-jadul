<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dapoer Jadoel - Resep Tradisional Indonesia</title>
    <!-- Font Tradisional -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Merriweather:wght@400;700&display=swap" rel="stylesheet">
    <!-- Icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* --- VARIABEL WARNA --- */
        :root {
            --primary: #5D4037;       /* Coklat Tua */
            --secondary: #8D6E63;     /* Coklat Muda */
            --accent: #D84315;        /* Merah Bata */
            --gold: #FFB300;          /* Emas */
            --bg-light: #FFF8E1;      /* Kuning Pucat */
            --bg-dark: #3E2723;       /* Hitam Coklat */
            --white: #FFFFFF;
        }

        /* --- RESET & BASE --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Merriweather', serif;
            background-color: var(--bg-light);
            color: var(--bg-dark);
            line-height: 1.6;
        }

        /* --- NAVIGASI --- */
        nav {
            background: linear-gradient(135deg, var(--primary), var(--bg-dark));
            padding: 15px 50px;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid var(--gold);
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.8em;
            color: var(--gold);
            text-decoration: none;
            font-weight: bold;
        }

        .logo i {
            margin-right: 10px;
        }

        .nav-menu {
            display: flex;
            gap: 25px;
            list-style: none;
        }

        .nav-menu a {
            color: var(--white);
            text-decoration: none;
            font-size: 1em;
            padding: 8px 15px;
            border-radius: 20px;
            transition: all 0.3s;
            font-family: 'Playfair Display', serif;
        }

        .nav-menu a:hover, .nav-menu a.active {
            background-color: var(--accent);
            color: var(--white);
        }

        /* --- HERO SECTION (HOME) --- */
        .hero {
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1552566626-52f8b828add9?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-position: center;
            height: 400px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: var(--white);
            padding: 20px;
        }

        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: 4em;
            color: var(--gold);
            text-shadow: 3px 3px 6px rgba(0,0,0,0.8);
            margin-bottom: 10px;
        }

        .hero p {
            font-size: 1.3em;
            max-width: 600px;
        }

        .btn-hero {
            margin-top: 20px;
            padding: 12px 30px;
            background-color: var(--accent);
            color: var(--white);
            text-decoration: none
